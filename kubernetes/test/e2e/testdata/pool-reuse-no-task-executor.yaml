apiVersion: sandbox.opensandbox.io/v1alpha1
kind: Pool
metadata:
  name: {{.PoolName}}
  namespace: {{.Namespace}}
spec:
  template:
    spec:
      containers:
      - name: sandbox-container
        image: {{.SandboxImage}}
        command: ["/bin/sh", "-c", "sleep infinity"]
  capacitySpec:
    bufferMax: 0
    bufferMin: 0
    poolMax: 5
    poolMin: 2
  # Reuse policy but without task-executor sidecar
  # Controller should fallback to Delete policy
  podRecyclePolicy: Reuse
  resetSpec:
    mainContainerName: sandbox-container
    cleanDirectories:
    - /tmp
    timeoutSeconds: 60
