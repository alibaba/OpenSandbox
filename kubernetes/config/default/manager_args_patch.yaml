# Patch to add metrics and task-executor-image arguments to the controller manager
# The TASK_EXECUTOR_IMAGE placeholder will be replaced by sed during deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --task-executor-image=TASK_EXECUTOR_IMAGE_PLACEHOLDER