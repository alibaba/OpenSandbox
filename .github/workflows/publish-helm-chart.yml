name: Publish Packages

on:
  push:
    tags:
      - 'packages/**'  # e.g., packages/v1.0.0

permissions:
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Parse version
        id: parse
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#packages/}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG_NAME -> Version: $VERSION"

      - name: Get chart version from Chart.yaml
        id: chart_version
        run: |
          CHART_VERSION=$(grep '^version:' kubernetes/charts/opensandbox/Chart.yaml | awk '{print $2}')
          echo "value=$CHART_VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $CHART_VERSION"

      - name: Update Chart.yaml appVersion
        run: |
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.parse.outputs.version }}\"/" kubernetes/charts/opensandbox/Chart.yaml
          grep -E '^(version|appVersion):' kubernetes/charts/opensandbox/Chart.yaml

      - name: Build Helm dependencies
        run: helm dependency build kubernetes/charts/opensandbox

      - name: Lint Helm chart
        run: helm lint kubernetes/charts/opensandbox

      - name: Package Helm chart
        run: helm package kubernetes/charts/opensandbox

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR (OCI)
        run: |
          CHART_PACKAGE=$(ls opensandbox-*.tgz)
          helm push "$CHART_PACKAGE" oci://ghcr.io/${{ github.repository_owner }}/helm-charts
          echo "Pushed: oci://ghcr.io/${{ github.repository_owner }}/helm-charts/opensandbox"
