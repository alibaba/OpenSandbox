name: Sandbox K8S E2E Tests

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'kubernetes/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'

jobs:
  e2e-k8s-1-22-4:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: |
          cd kubernetes
          make test-e2e KIND_K8S_VERSION=v1.22.4

  e2e-k8s-1-24-4:
